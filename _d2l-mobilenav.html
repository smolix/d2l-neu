<!-- d2l mobile navigation — Option C: one hamburger, centered monogram-home,
     a single drawer with Contents / Menu tabs. Self-contained (CSS+JS here);
     only applies below 992px, desktop is untouched. Logos are the site mark
     recoloured white (transparent bg) and inlined so there is no asset path to
     resolve. Fail-safe: the custom bar replaces Quarto's default hamburgers
     ONLY after the JS has successfully built the drawer (body.d2l-mnav-ready);
     if the build throws, Quarto's own nav is left working. Wired via
     include-after-body in _quarto.yml. -->
<style>
  /* hidden until the JS builds them and marks the body ready */
  #d2l-burger,#d2l-home,#d2l-drawer,#d2l-scrim{display:none}

  @media (max-width:991.98px){
    /* take over only once our drawer is built */
    body.d2l-mnav-ready #quarto-header .navbar .navbar-toggler,
    body.d2l-mnav-ready #quarto-header .navbar .quarto-navbar-tools .quarto-btn-toggle{display:none!important}
    body.d2l-mnav-ready #quarto-header .navbar #navbarCollapse{display:none!important}
    body.d2l-mnav-ready #quarto-header .navbar .navbar-container{position:relative;display:flex;align-items:center;gap:4px}

    body.d2l-mnav-ready #d2l-burger{display:inline-grid;place-items:center;height:40px;width:44px;order:-2;
      appearance:none;border:0;background:transparent;border-radius:8px;cursor:pointer;padding:0}
    body.d2l-mnav-ready #d2l-burger:hover{background:rgba(255,255,255,.14)}
    body.d2l-mnav-ready #d2l-burger:focus-visible{outline:2px solid #fff;outline-offset:2px}
    body.d2l-mnav-ready #d2l-home{display:inline-flex;align-items:center;position:absolute;left:50%;top:0;bottom:0;
      transform:translateX(-50%);padding:0 6px;cursor:pointer}
    body.d2l-mnav-ready #d2l-home img{height:30px;width:auto;display:block}
    body.d2l-mnav-ready #d2l-home:focus-visible{outline:2px solid #fff;outline-offset:-3px;border-radius:6px}
    body.d2l-mnav-ready #quarto-header .navbar #quarto-search{margin-left:auto;order:10}

    /* drawer + scrim (only ever visible once built AND opened) */
    body.d2l-mnav-ready #d2l-scrim{display:block;position:fixed;inset:0;background:rgba(11,30,55,.44);
      opacity:0;visibility:hidden;transition:opacity .22s;z-index:1090}
    body.d2l-mnav-ready #d2l-drawer{display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;
      width:85%;max-width:330px;background:#fff;z-index:1091;transform:translateX(-104%);
      transition:transform .24s cubic-bezier(.2,.7,.2,1);box-shadow:0 0 44px rgba(0,0,0,.28)}
    body.d2l-mnav-ready.d2l-open{overflow:hidden}
    body.d2l-mnav-ready.d2l-open #d2l-scrim{opacity:1;visibility:visible}
    body.d2l-mnav-ready.d2l-open #d2l-drawer{transform:none}

    #d2l-drawer .d2l-dhead{flex:0 0 auto;height:52px;background:#0D47A1;color:#fff;
      display:flex;align-items:center;gap:10px;padding:0 12px}
    #d2l-drawer .d2l-dhead img{height:22px}
    #d2l-drawer .d2l-dx{margin-left:auto;appearance:none;border:0;background:transparent;color:#fff;
      width:34px;height:34px;border-radius:7px;font-size:1.15rem;cursor:pointer;line-height:1}
    #d2l-drawer .d2l-dx:hover{background:rgba(255,255,255,.16)}
    #d2l-drawer .d2l-tabs{flex:0 0 auto;display:flex;border-bottom:1px solid #e3e9f0;background:#fff}
    #d2l-drawer .d2l-tabs button{flex:1;appearance:none;border:0;background:transparent;font:inherit;
      font-weight:700;font-size:.9rem;color:#5c6773;padding:12px 0;cursor:pointer;border-bottom:3px solid transparent}
    #d2l-drawer .d2l-tabs button[aria-selected="true"]{color:#1976D2;border-bottom-color:#2196F3}
    #d2l-drawer .d2l-pane{display:none;overflow:auto;flex:1;-webkit-overflow-scrolling:touch}
    #d2l-drawer .d2l-pane.on{display:block}

    #d2l-drawer #d2l-contents .sidebar-menu-container{padding:6px 0}
    #d2l-drawer .d2l-menu a{display:block;padding:11px 16px;color:#2b333b;text-decoration:none;
      font-size:.92rem;font-weight:600;border-bottom:1px solid #f0f3f6}
    #d2l-drawer .d2l-menu a:hover{background:#E8F3FD}
    #d2l-drawer .d2l-menu .d2l-grp{padding:6px 0 2px}
    #d2l-drawer .d2l-menu .d2l-grp>span{display:block;padding:10px 16px 3px;color:#5c6773;
      font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
    #d2l-drawer .d2l-menu .d2l-grp a{padding-left:30px;font-weight:500;font-size:.86rem;border-bottom:0}
  }
</style>

    if(document.getElementById("d2l-drawer")) return;
    var navc=q("#quarto-header .navbar .navbar-container");
    if(!navc) return;  // no navbar on this page → leave it alone

    var slog=q("#quarto-sidebar .sidebar-logo-link");
    var homeHref=(slog && slog.getAttribute("href")) || "/";

    var burger=document.createElement("button");
    burger.id="d2l-burger"; burger.type="button"; burger.setAttribute("aria-label","Open menu");
    burger.setAttribute("aria-controls","d2l-drawer"); burger.setAttribute("aria-expanded","false");
    burger.innerHTML='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>';

    var home=document.createElement("a");
    home.id="d2l-home"; home.href=homeHref; home.setAttribute("aria-label","Home");
    home.innerHTML='<img src="'+MARK+'" alt="Dive into Deep Learning — home">';

    navc.insertBefore(burger, navc.firstChild);
    navc.appendChild(home);

    var drawer=document.createElement("aside");
    drawer.id="d2l-drawer"; drawer.setAttribute("aria-hidden","true");
    drawer.innerHTML=
      '<div class="d2l-dhead"><img src="'+FULL+'" alt=""><button class="d2l-dx" type="button" aria-label="Close">&#10005;</button></div>'+
      '<div class="d2l-tabs" role="tablist">'+
        '<button role="tab" aria-selected="true" data-pane="d2l-contents">Contents</button>'+
        '<button role="tab" aria-selected="false" data-pane="d2l-menu">Menu</button>'+
      '</div>'+
      '<div class="d2l-pane on" id="d2l-contents"></div>'+
      '<div class="d2l-pane" id="d2l-menu"></div>';
    var scrim=document.createElement("div"); scrim.id="d2l-scrim";
    document.body.appendChild(scrim);
    document.body.appendChild(drawer);

    var toc=q("#quarto-sidebar .sidebar-menu-container");
    if(toc) q("#d2l-contents",drawer).innerHTML=toc.outerHTML;

    var menu=document.createElement("div"); menu.className="d2l-menu";
    document.querySelectorAll("#navbarCollapse .navbar-nav > .nav-item").forEach(function(li){
      var dd=li.querySelector(".dropdown-menu");
      if(dd){
        var lbl=li.querySelector(".nav-link, .dropdown-toggle");
        var g=document.createElement("div"); g.className="d2l-grp";
        var s=document.createElement("span"); s.textContent=(lbl?lbl.textContent:"").trim(); g.appendChild(s);
        dd.querySelectorAll("a.dropdown-item").forEach(function(a){
          var na=document.createElement("a"); na.href=a.getAttribute("href")||"#";
          na.textContent=a.textContent.trim(); g.appendChild(na);
        });
        menu.appendChild(g);
      }else{
        var a=li.querySelector("a.nav-link"); if(!a) return;
        var na=document.createElement("a"); na.href=a.getAttribute("href")||"#";
        na.textContent=a.textContent.trim();
        if(a.getAttribute("target")) na.target=a.getAttribute("target");
        menu.appendChild(na);
      }
    });
    q("#d2l-menu",drawer).appendChild(menu);

    function setOpen(o){
      document.body.classList.toggle("d2l-open",o);
      burger.setAttribute("aria-expanded",o?"true":"false");
      drawer.setAttribute("aria-hidden",o?"false":"true");
    }
    burger.addEventListener("click",function(){setOpen(true);});
    scrim.addEventListener("click",function(){setOpen(false);});
    q(".d2l-dx",drawer).addEventListener("click",function(){setOpen(false);});
    drawer.querySelectorAll(".d2l-tabs button").forEach(function(b){
      b.addEventListener("click",function(){
        drawer.querySelectorAll(".d2l-tabs button").forEach(function(x){x.setAttribute("aria-selected", x===b?"true":"false");});
        drawer.querySelectorAll(".d2l-pane").forEach(function(p){p.classList.toggle("on", p.id===b.getAttribute("data-pane"));});
      });
    });
    drawer.addEventListener("click",function(e){ if(e.target.closest("a")) setOpen(false); });
    document.addEventListener("keydown",function(e){ if(e.key==="Escape") setOpen(false); });

    // success → let CSS swap Quarto's default hamburgers for our bar
    document.body.classList.add("d2l-mnav-ready");
  }
  function safeBuild(){ try{ build(); }catch(e){ if(window.console) console.warn("d2l mobile nav disabled:", e); } }
  if(document.readyState!=="loading") safeBuild(); else document.addEventListener("DOMContentLoaded",safeBuild);
})();
</script>
