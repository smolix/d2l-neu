<!--
  Top navigation bar injected into every slide deck via Quarto's
  `include-after-body`. Mirrors the book's chrome:
    - 280px white box on the left with the d2l logo
    - blue navbar on the right with Book Chapter / Slides / Courses /
      GitHub / Discuss links
  Same visual treatment as `_book/index.html` and `_book/slides/index.html`.

  Path math, with the deck deployed at
  `<root>/slides/<fw>/<chapter>/<file>.html` (3 dirs deep under root):
    ../../../index.html                → <root>/index.html        (book home)
    ../../index.html                   → <root>/slides/index.html (slides landing)
    ../../../static/logo-with-text.png → <root>/static/logo-with-text.png
  The "Book Chapter" link is rewritten by JS to the corresponding book
  chapter URL (e.g. /chapter_x/foo.html), and the logo + chapter labels
  are kept in sync with the framework the deck belongs to.
-->
<nav class="d2l-deck-nav">
  <div class="d2l-deck-brand">
    <a class="d2l-deck-logo" href="../../../index.html"
       title="Dive into Deep Learning — book home">
      <img src="../../../static/logo-with-text.png" alt="Dive into Deep Learning">
    </a>
  </div>
  <ul class="d2l-deck-nav-links">
    <li><a href="../../../index.html">Book Chapter</a></li>
    <li><a href="../../index.html">Slides</a></li>
    <li><a href="https://courses.d2l.ai">Courses</a></li>
    <li><a href="https://github.com/smolix/d2l-neu" title="GitHub">GitHub</a></li>
    <li><a href="https://d2l.discourse.group">Discuss</a></li>
  </ul>
</nav>
<!-- Presenter / speaker-view toggle, parked in the bottom-left control
     cluster next to reveal's menu + chalkboard icons (not the top navbar). -->
<button id="d2l-deck-presenter" class="d2l-presenter-btn"
        title="Open speaker / presenter view in a second window (shortcut: S)"
        aria-label="Presenter view">
  <!-- Inline SVG (Quarto's revealjs doesn't load the bootstrap-icons font):
       a presentation screen with a speaker figure. -->
  <svg viewBox="0 0 16 16" width="21" height="21" fill="none"
       stroke="currentColor" stroke-width="1.2"
       stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <rect x="1.1" y="1.7" width="13.8" height="9.2" rx="1.2"/>
    <path d="M5.6 13.4h4.8M8 10.9v2.5"/>
    <circle cx="8" cy="5" r="1.35" fill="currentColor" stroke="none"/>
    <path d="M5.5 8.7a2.5 2.5 0 0 1 5 0z" fill="currentColor" stroke="none"/>
  </svg>
</button>
<script>
// (1) Rewrite the "Book Chapter" link to the corresponding book HTML
//     (e.g. /slides/pytorch/chapter_x/foo.html → /chapter_x/foo.html).
//     The logo link stays pointing at book home.
// (2) Wire the "Presenter" link to the reveal-notes plugin's open()
//     API. This is the same call the reveal menu uses for its
//     "Speaker View" tool item; doing it from a direct user click in
//     the navbar keeps the popup-blocker happy and gives a visible
//     affordance for the otherwise-undiscoverable `S` shortcut.
(function() {
  function init() {
    var parts = window.location.pathname.split('/');
    var i = parts.lastIndexOf('slides');
    if (i >= 0 && i + 3 < parts.length) {
      var prefix = parts.slice(0, i).join('/') + '/';
      var framework = parts[i + 1];
      var chapter = parts[i + 2];
      var file = parts[i + 3];
      var chapterUrl = prefix + chapter + '/' + file +
                       '?framework=' + encodeURIComponent(framework);
      var first = document.querySelector('.d2l-deck-nav-links a');
      if (first) first.setAttribute('href', chapterUrl);
    }
    var presenter = document.getElementById('d2l-deck-presenter');
    if (presenter) {
      presenter.addEventListener('click', function(ev) {
        ev.preventDefault();
        try {
          var notes = window.Reveal && Reveal.getPlugin &&
                      Reveal.getPlugin('notes');
          if (notes && typeof notes.open === 'function') {
            notes.open();
            return;
          }
        } catch (e) { /* fall through to keyboard fallback */ }
        // Fallback: synthesize the `S` keypress the notes plugin
        // listens for. Works even if the plugin's `open` export is
        // unavailable (older bundled reveal builds).
        var ev2 = new KeyboardEvent('keydown',
            { key: 'S', code: 'KeyS', keyCode: 83, which: 83,
              bubbles: true, cancelable: true });
        document.dispatchEvent(ev2);
      });
    }
    attachChrome();
  }

  // (3) Scale the fixed navbar by the SAME factor reveal scales the slides,
  //     so the whole deck resizes as one unit (otherwise the px-sized navbar
  //     stays huge while the content shrinks). Anchored top-left; width is
  //     pre-divided by the scale so it still spans the viewport after scaling.
  function syncChrome() {
    if (!window.Reveal || typeof Reveal.getScale !== 'function') return;
    var s = Reveal.getScale() || 1;
    var nav = document.querySelector('.d2l-deck-nav');
    if (nav) {
      nav.style.transformOrigin = 'top left';
      nav.style.right = 'auto';
      nav.style.width = (100 / s) + 'vw';
      nav.style.transform = 'scale(' + s + ')';
    }
  }
  function attachChrome() {
    if (window.Reveal && typeof Reveal.on === 'function') {
      Reveal.on('ready', syncChrome);
      Reveal.on('resize', syncChrome);
      if (typeof Reveal.isReady === 'function' && Reveal.isReady()) syncChrome();
    } else {
      setTimeout(attachChrome, 60);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else { init(); }
})();
</script>
