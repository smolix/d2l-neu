<!--
  Floating affordances injected into every slide deck via Quarto's
  `include-after-body`. CSS lives in `_d2l-slides.scss` (.d2l-overlay,
  .d2l-logo).

  When the slides are deployed under `_book/slides/<fw>/<chapter>/<file>.html`,
  `../../index.html` resolves to `_book/slides/index.html` (slides landing)
  and `../../../index.html` resolves to `_book/index.html` (book home).
-->
<div class="d2l-overlay">
  <a class="d2l-overlay-link" href="../../../index.html"
     title="Back to the book">Book</a>
  <a class="d2l-logo" href="../../index.html"
     title="Back to slide index (Esc / B)">
    <img src="../img/d2l-logo.png" alt="d2l">
  </a>
</div>
