<script>
// D2L framework tab sync + visibility
// Self-contained implementation that works on file:// URLs
// (Quarto's built-in tabsets.js is an ES module which browsers block on file://)
//
// Features:
// 1. Syncs tab selection across all panel-tabsets with group="framework"
// 2. Hides tabsets that don't have the selected framework's tab
// 3. Persists selection in localStorage

(function() {
  var GROUP = 'framework';
  var STORAGE_KEY = 'quarto-persistent-tabsets-data';
  var FW_TO_DISPLAY = {
    pytorch: 'PyTorch',
    tensorflow: 'TensorFlow',
    jax: 'JAX',
    mxnet: 'MXNet'
  };
  var DISPLAY_TO_FW = {};
  Object.keys(FW_TO_DISPLAY).forEach(function(key) {
    DISPLAY_TO_FW[FW_TO_DISPLAY[key].toLowerCase()] = FW_TO_DISPLAY[key];
    DISPLAY_TO_FW[key] = FW_TO_DISPLAY[key];
  });

  function normalizeFramework(name) {
    if (!name) return null;
    var key = String(name).trim();
    return DISPLAY_TO_FW[key] || DISPLAY_TO_FW[key.toLowerCase()] || key;
  }

  function getStored() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    } catch(e) { return {}; }
  }

  function setStored(name) {
    try {
      var data = getStored();
      data[GROUP] = name;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {}
  }

  function syncTabs(selectedName) {
    if (!selectedName) return;

    document.querySelectorAll('.panel-tabset[data-group="' + GROUP + '"]').forEach(function(tabset) {
      var navLinks = tabset.querySelectorAll('.nav-link');
      var hasMatch = false;

      navLinks.forEach(function(link) {
        var panelId = link.getAttribute('aria-controls');
        var panel = panelId ? document.getElementById(panelId) : null;

        if (link.textContent.trim() === selectedName) {
          hasMatch = true;
          link.classList.add('active');
          link.setAttribute('aria-selected', 'true');
          if (panel) {
            panel.classList.add('active');
            panel.classList.add('show');
          }
        } else {
          link.classList.remove('active');
          link.setAttribute('aria-selected', 'false');
          if (panel) {
            panel.classList.remove('active');
            panel.classList.remove('show');
          }
        }
      });

      // Hide entire tabset if it doesn't have the selected framework
      tabset.style.display = hasMatch ? '' : 'none';
      var prev = tabset.previousElementSibling;
      if (prev && prev.classList.contains('tabset-margin-container')) {
        prev.style.display = hasMatch ? '' : 'none';
      }
    });

    setStored(selectedName);
  }

  function init() {
    var tabsets = document.querySelectorAll('.panel-tabset[data-group="' + GROUP + '"]');
    if (tabsets.length === 0) return;

    // Register click handlers on all framework tab links
    tabsets.forEach(function(tabset) {
      tabset.querySelectorAll('.nav-link').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();  // prevent Bootstrap's default single-tabset handling
          syncTabs(link.textContent.trim());
        });
      });
    });

    // Restore saved preference, or default to whatever is currently active
    var params = new URLSearchParams(window.location.search);
    var requested = params.get('framework');
    var stored = getStored();
    var initial = normalizeFramework(requested || stored[GROUP]);
    if (!initial) {
      var firstActive = document.querySelector(
        '.panel-tabset[data-group="' + GROUP + '"] .nav-link.active'
      );
      initial = firstActive ? firstActive.textContent.trim() : null;
    }
    if (initial) {
      syncTabs(initial);
    }
  }

  // Run when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<script>
// Hide tab chrome on text-only tabsets.
// A tabset is "text-only" if none of its panes contain a code block.
// Adds d2l-text-only class AND directly hides the nav to beat Bootstrap timing.
(function() {
  function update() {
    document.querySelectorAll('.panel-tabset[data-group="framework"]').forEach(function(tabset) {
      if (tabset.classList.contains('d2l-output-tabs')) return;
      var hasCode = tabset.querySelector('.sourceCode, .cell-code, pre > code');
      if (hasCode) {
        tabset.classList.remove('d2l-text-only');
      } else {
        tabset.classList.add('d2l-text-only');
        var nav = tabset.querySelector(':scope > .nav');
        if (nav) nav.style.display = 'none';
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', update);
  } else {
    update();
  }
  // Run again after a short delay to catch any Quarto/Bootstrap re-rendering
  setTimeout(update, 100);
})();
</script>

<script>
// Make sidebar part headers clickable — navigate to the first chapter (index page)
(function() {
  function init() {
    document.querySelectorAll('.sidebar-item-section').forEach(function(section) {
      var firstLink = section.querySelector('.sidebar-item-container li:first-child a');
      var partHeader = section.querySelector(':scope > .sidebar-item-text');
      if (firstLink && partHeader) {
        var url = firstLink.getAttribute('href');
        if (url) {
          partHeader.style.cursor = 'pointer';
          partHeader.addEventListener('click', function(e) {
            // Only navigate if the click wasn't on the collapse toggle
            if (!e.target.closest('.sidebar-item-toggle')) {
              window.location.href = url;
            }
          });
        }
      }
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<script>
// Sidebar section collapse persistence
// - Default: all collapsed
// - User toggles are saved to localStorage and restored across pages
(function() {
  var STORAGE_KEY = 'd2l-sidebar-expanded';

  function getExpanded() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    } catch(e) { return {}; }
  }

  function saveExpanded(state) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch(e) {}
  }

  function init() {
    var sections = document.querySelectorAll('.sidebar-item-section');
    var state = getExpanded();

    sections.forEach(function(section) {
      var toggle = section.querySelector('[data-bs-target]');
      if (!toggle) return;
      var targetId = toggle.getAttribute('data-bs-target');
      if (!targetId) return;
      var target = document.querySelector(targetId);
      if (!target) return;

      var id = targetId.replace('#', '');

      // Check if the current page is inside this section
      var isActive = section.querySelector('.sidebar-link.active') !== null;

      // Determine initial state: expanded if (a) user previously expanded it,
      // or (b) it contains the active page. Otherwise collapsed.
      var shouldExpand = state[id] === true || isActive;

      if (shouldExpand) {
        target.classList.add('show');
        section.querySelectorAll('[aria-expanded]').forEach(function(el) {
          el.setAttribute('aria-expanded', 'true');
        });
      } else {
        target.classList.remove('show');
        section.querySelectorAll('[aria-expanded]').forEach(function(el) {
          el.setAttribute('aria-expanded', 'false');
        });
      }

      // Listen for Bootstrap collapse events to persist state
      target.addEventListener('shown.bs.collapse', function() {
        var s = getExpanded();
        s[id] = true;
        saveExpanded(s);
      });
      target.addEventListener('hidden.bs.collapse', function() {
        var s = getExpanded();
        s[id] = false;
        saveExpanded(s);
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<script>
// TOC slides button — appends a "Slides" link below the right-sidebar
// TOC pointing at the slide deck for the current page in the currently
// selected framework. Re-targets when the framework tab changes.
//
// Reads window.D2L_SLIDES_MANIFEST (defined in _d2l-slides-data.html,
// generated by tools/build_slides_index.py).
(function() {
  if (!window.D2L_SLIDES_MANIFEST) return;

  var FW_DISPLAY = {
    pytorch: 'PyTorch', tensorflow: 'TensorFlow',
    jax: 'JAX', mxnet: 'MXNet'
  };
  var DISPLAY_TO_FW = {};
  Object.keys(FW_DISPLAY).forEach(function(k) {
    DISPLAY_TO_FW[FW_DISPLAY[k]] = k;
  });

  function getPageKey() {
    // /<chapter>/<file>.html → "chapter_X/file"
    var path = window.location.pathname.replace(/\/$/, '');
    var segs = path.split('/').filter(Boolean);
    if (segs.length < 2) return null;
    var fname = segs[segs.length - 1];
    if (!/\.html$/.test(fname)) return null;
    var stem = fname.replace(/\.html$/, '');
    var chap = segs[segs.length - 2];
    if (!/^chapter_/.test(chap)) return null;
    return chap + '/' + stem;
  }

  function getDepth() {
    var segs = window.location.pathname.split('/').filter(Boolean);
    var bookIdx = segs.lastIndexOf('_book');
    if (bookIdx >= 0) {
      return Math.max(0, segs.length - bookIdx - 2);
    }
    return Math.max(0, segs.length - 1);
  }

  function getCurrentFw() {
    try {
      var data = JSON.parse(localStorage.getItem('quarto-persistent-tabsets-data') || '{}');
      var name = DISPLAY_TO_FW[data.framework];
      if (name) return name;
    } catch(_) {}
    // Fall back to the active tab on the page if any.
    var active = document.querySelector(
      '.panel-tabset[data-group="framework"] .nav-link.active');
    if (active) {
      var fw = DISPLAY_TO_FW[active.textContent.trim()];
      if (fw) return fw;
    }
    return 'pytorch';
  }

  function buildUrl(fw, key) {
    var prefix = '';
    var d = getDepth();
    for (var i = 0; i < d; i++) prefix += '../';
    return prefix + 'slides/' + fw + '/' + key + '.html';
  }

  var buttonEl = null;
  var available = [];
  var pageKey = null;

  function update() {
    if (!buttonEl) return;
    var fw = getCurrentFw();
    var link = buttonEl.querySelector('a');
    var fwLabel = FW_DISPLAY[fw] || fw;
    var fwSpan = link.querySelector('.d2l-toc-slides-fw');
    if (available.indexOf(fw) !== -1) {
      link.href = buildUrl(fw, pageKey);
      link.classList.remove('disabled');
      link.removeAttribute('aria-disabled');
      link.title = 'Open ' + fwLabel + ' slides for this section';
      fwSpan.textContent = '(' + fwLabel + ')';
    } else {
      link.removeAttribute('href');
      link.classList.add('disabled');
      link.setAttribute('aria-disabled', 'true');
      var altList = available.map(function(f) { return FW_DISPLAY[f]; }).join(', ');
      link.title = altList
        ? 'No ' + fwLabel + ' deck. Available: ' + altList
        : 'No slides for this section';
      fwSpan.textContent = '(' + fwLabel + ' n/a)';
    }
  }

  function init() {
    // Idempotency guard: Cloudflare Rocket Loader fires a synthetic
    // DOMContentLoaded after its `simulateStateAfterDeferScripts-
    // Activation` pass, which re-invokes any DOMContentLoaded handler
    // already registered. Without this check, init() runs twice and
    // appends two ".d2l-toc-slides" buttons to the TOC.
    if (window.__d2lTocSlidesInit) return;
    window.__d2lTocSlidesInit = true;

    pageKey = getPageKey();
    if (!pageKey) return;
    var entry = window.D2L_SLIDES_MANIFEST[pageKey];
    if (!entry || !entry.length) return;
    available = entry.slice();

    var toc = document.getElementById('TOC');
    if (!toc) return;

    var wrapper = document.createElement('div');
    wrapper.className = 'd2l-toc-slides';
    wrapper.innerHTML =
      '<a href="#">' +
      '<span class="d2l-toc-slides-icon">▶</span>' +
      '<span>Slides</span>' +
      '<span class="d2l-toc-slides-fw"></span>' +
      '</a>';
    toc.appendChild(wrapper);
    buttonEl = wrapper;

    update();

    // The framework-sync script registers click handlers on tab links;
    // we piggyback so the button retargets when the user switches.
    document.querySelectorAll(
      '.panel-tabset[data-group="framework"] .nav-link'
    ).forEach(function(tab) {
      tab.addEventListener('click', function() { setTimeout(update, 0); });
    });
    // Cross-tab sync (another window switched framework).
    window.addEventListener('storage', function(e) {
      if (e.key === 'quarto-persistent-tabsets-data') update();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<script>
// Social share buttons — Twitter/X, Facebook, Threads, LinkedIn.
// Two locations, mutually exclusive (per viewport):
//   (A) right-TOC, under the Slides button — visible at ≥1200px when
//       the TOC is shown; hidden on narrow viewports.
//   (C) bottom of the article body — visible whenever (A) isn't
//       (mobile, narrow desktop, or pages without a right TOC).
// CSS in `_d2l-theme.scss` (`.d2l-share-block`, `.d2l-share-bottom`)
// handles the visibility toggle. Both blocks read window.location.href
// + document.title at click time, so the same code drives both.
(function() {
  function buildUrls() {
    var url = encodeURIComponent(location.href);
    var title = encodeURIComponent(
      document.title.replace(/\s*[—-]\s*Dive into Deep Learning.*$/, '')
    );
    return {
      twitter:  'https://twitter.com/intent/tweet?url=' + url + '&text=' + title,
      facebook: 'https://www.facebook.com/sharer/sharer.php?u=' + url,
      threads:  'https://www.threads.net/intent/post?text=' + title + '%20' + url,
      linkedin: 'https://www.linkedin.com/sharing/share-offsite/?url=' + url
    };
  }

  // Skip on landing / framework-selector / slides-index pages — those
  // aren't a single "page worth sharing".
  function skip() {
    var p = location.pathname;
    return /\/(index)\.html$/.test(p) ||
           /\/slides\/(index\.html)?$/.test(p);
  }

  var ICONS = [
    {key: 'twitter',  cls: 'bi-twitter-x', label: 'Share on X (Twitter)'},
    {key: 'facebook', cls: 'bi-facebook',  label: 'Share on Facebook'},
    {key: 'threads',  cls: 'bi-threads',   label: 'Share on Threads'},
    {key: 'linkedin', cls: 'bi-linkedin',  label: 'Share on LinkedIn'}
  ];

  function makeAnchors(urls) {
    return ICONS.map(function(ic) {
      var a = document.createElement('a');
      a.className = 'd2l-share-icon';
      a.href = urls[ic.key];
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.title = ic.label;
      a.setAttribute('aria-label', ic.label);
      a.innerHTML = '<i class="bi ' + ic.cls + '" aria-hidden="true"></i>';
      return a;
    });
  }

  function init() {
    // Cloudflare Rocket Loader emits a synthetic DOMContentLoaded
    // after script activation, which would otherwise inject the
    // share blocks twice. Same pattern as `__d2lTocSlidesInit` and
    // `__d2lQuartoSearchInit`.
    if (window.__d2lShareInit) return;
    window.__d2lShareInit = true;

    if (skip()) return;
    var urls = buildUrls();

    // (C) — bottom of article. Inserted before any Discourse embed
    // container the next script appends, so the order on-page is:
    //   …article body…
    //   share buttons
    //   discourse comments
    var main = document.querySelector('main.content');
    if (main) {
      var bottom = document.createElement('div');
      bottom.className = 'd2l-share-bottom';
      var label = document.createElement('span');
      label.className = 'd2l-share-label';
      label.textContent = 'Share';
      bottom.appendChild(label);
      makeAnchors(urls).forEach(function(a) { bottom.appendChild(a); });
      main.appendChild(bottom);
    }

    // (A) — right TOC, under the Slides button (or at the TOC bottom
    // if there's no slides button for this page).
    var toc = document.getElementById('TOC');
    if (toc) {
      var block = document.createElement('div');
      block.className = 'd2l-share-block';
      var label2 = document.createElement('div');
      label2.className = 'd2l-share-label';
      label2.textContent = 'Share';
      block.appendChild(label2);
      var icons = document.createElement('div');
      icons.className = 'd2l-share-icons';
      makeAnchors(urls).forEach(function(a) { icons.appendChild(a); });
      block.appendChild(icons);
      toc.appendChild(block);
      // Mark the body so the bottom row knows it can hide itself when
      // the TOC is visible at desktop widths.
      document.body.classList.add('has-d2l-toc-share');
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<script>
// Discourse discussion embed
// Replaces plain d2l.discourse.group links with inline Discourse comment streams.
// When framework tabs switch, the embed reloads with the new topic.
(function() {
  var DISCOURSE_URL = 'https://d2l.discourse.group/';
  // Topic id from the current d2l.discourse.group links (also accept the
  // legacy discuss.d2l.ai form, so any un-migrated link still resolves).
  var LINK_RE = /^https:\/\/(?:discuss\.d2l\.ai|d2l\.discourse\.group)\/t\/(\d+)/;

  function createEmbed(topicId) {
    var container = document.getElementById('d2l-discourse-embed');
    if (!container) {
      container = document.createElement('div');
      container.id = 'd2l-discourse-embed';
      var main = document.querySelector('main.content');
      if (main) main.appendChild(container);
    }
    container.innerHTML = '';

    var iframe = document.createElement('div');
    iframe.id = 'discourse-comments';
    container.appendChild(iframe);

    window.DiscourseEmbed = {
      discourseUrl: DISCOURSE_URL,
      topicId: topicId
    };

    var oldScript = document.getElementById('d2l-discourse-script');
    if (oldScript) oldScript.remove();

    var s = document.createElement('script');
    s.id = 'd2l-discourse-script';
    s.type = 'text/javascript';
    s.async = true;
    s.src = DISCOURSE_URL + 'javascripts/embed.js';
    (document.head || document.getElementsByTagName('head')[0]).appendChild(s);
  }

  function findActiveTopicId() {
    var activePanel = document.querySelector(
      '.panel-tabset[data-group="framework"] .tab-pane.active'
    );
    if (activePanel) {
      var link = activePanel.querySelector('a[href*="d2l.discourse.group/t/"]');
      if (link) {
        var m = link.href.match(LINK_RE);
        if (m) return m[1];
      }
    }
    var links = document.querySelectorAll('a[href*="d2l.discourse.group/t/"]');
    for (var i = 0; i < links.length; i++) {
      var m = links[i].href.match(LINK_RE);
      if (m) return m[1];
    }
    return null;
  }

  function hideDiscussionLinks() {
    document.querySelectorAll('a[href*="d2l.discourse.group/t/"]').forEach(function(link) {
      var p = link.closest('p') || link;
      p.style.display = 'none';
    });
  }

  function loadEmbed() {
    var topicId = findActiveTopicId();
    if (topicId) {
      hideDiscussionLinks();
      createEmbed(topicId);
    }
  }

  function init() {
    var links = document.querySelectorAll('a[href*="d2l.discourse.group/t/"]');
    if (links.length === 0) return;

    loadEmbed();

    document.querySelectorAll('.panel-tabset[data-group="framework"] .nav-link')
      .forEach(function(tab) {
        tab.addEventListener('click', function() {
          setTimeout(loadEmbed, 50);
        });
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
