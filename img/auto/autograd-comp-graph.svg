seline="central">← backward</text><text x="300" y="228" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">chain rule:  ∂y/∂x = (∂y/∂a)(∂a/∂x) = 2 · 2x = 4x</text></svg>
