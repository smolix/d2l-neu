<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 258" width="620" height="258"><style><![CDATA[@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');]]></style><text x="310" y="28" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">Detaching freezes a value to a constant</text><line x1="101" y1="92" x2="175" y2="92" stroke="#15181C" stroke-width="2.3"/><path d="M175,92 L167.69528847750152,95.26208362447656 L167.69528847750152,88.73791637552344 Z" fill="#15181C"/><text x="142" y="80" font-family="JetBrains Mono, monospace" font-size="11.5" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">square</text><line x1="253" y1="92" x2="314" y2="92" stroke="#90A4AE" stroke-width="2" stroke-dasharray="5 4"/><line x1="286" y1="83" x2="300" y2="101" stroke="#E53935" stroke-width="2.4"/><line x1="286" y1="101" x2="300" y2="83" stroke="#E53935" stroke-width="2.4"/><text x="293" y="76" font-family="JetBrains Mono, monospace" font-size="11.5" font-weight="700" fill="#E53935" text-anchor="middle" dominant-baseline="central">detach</text><line x1="430" y1="92" x2="474" y2="92" stroke="#15181C" stroke-width="2.3"/><path d="M474,92 L466.69528847750155,95.26208362447656 L466.69528847750155,88.73791637552344 Z" fill="#15181C"/><text x="452" y="80" font-family="JetBrains Mono, monospace" font-size="11.5" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">× x</text><rect x="39" y="66" width="62" height="52" rx="10" fill="#F3E5F5" stroke="#7D12BA" stroke-width="2"/><text x="70" y="84" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">x</text><text x="70" y="105" font-family="Source Sans 3, sans-serif" font-size="11.5" font-weight="500" fill="#6B7280" text-anchor="middle" dominant-baseline="central">input</text><rect x="175" y="66" width="78" height="52" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="214" y="92" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">x²</text><rect x="314" y="66" width="116" height="52" rx="10" fill="#ECEFF1" stroke="#90A4AE" stroke-width="2" stroke-dasharray="5 4"/><text x="372" y="84" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">u</text><text x="372" y="105" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="500" fill="#6B7280" text-anchor="middle" dominant-baseline="central">constant</text><rect x="474" y="66" width="116" height="52" rx="10" fill="#D7EFD8" stroke="#43A047" stroke-width="2"/><text x="532" y="92" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">z = u·x</text><path d="M532,118 C 532,170 70,170 70,118" fill="none" stroke="#2196F3" stroke-width="2.4"/><line x1="71" y1="132" x2="70" y2="119" stroke="#2196F3" stroke-width="2.3"/><path d="M70,119 L73.81272090900424,126.0330049957356 L67.30777068927301,126.53338578186877 Z" fill="#2196F3"/><text x="310" y="174" font-family="Source Sans 3, sans-serif" font-size="12.5" font-weight="700" fill="#2196F3" text-anchor="middle" dominant-baseline="central">∂z/∂x = u   (gradient returns only through the direct edge)</text><text x="310" y="244" font-family="Source Sans 3, sans-serif" font-size="12" font-weight="600" fill="#6B7280" text-anchor="middle" dominant-baseline="central">the path above u is cut, so z = x·x·x but ∂z/∂x = u, not 3x²</text></svg>
