<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 236" width="700" height="236"><style><![CDATA[@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');]]></style><text x="350" y="28" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">The autograd loop</text><rect x="28" y="67" width="138" height="66" rx="11" fill="#fff" stroke="#90A4AE" stroke-width="2"/><circle cx="47" cy="86" r="11.5" fill="#7D12BA"/><text x="47" y="86" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text><text x="106" y="94" font-family="JetBrains Mono, monospace" font-size="14.5" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">mark</text><text x="97" y="116" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="500" fill="#6B7280" text-anchor="middle" dominant-baseline="central">flag an input</text><line x1="169" y1="100" x2="193.66666666666666" y2="100" stroke="#15181C" stroke-width="2.3"/><path d="M193.66666666666666,100 L186.36195514416818,103.26208362447656 L186.36195514416818,96.73791637552344 Z" fill="#15181C"/><rect x="196.66666666666666" y="67" width="138" height="66" rx="11" fill="#fff" stroke="#90A4AE" stroke-width="2"/><circle cx="215.66666666666666" cy="86" r="11.5" fill="#7D12BA"/><text x="215.66666666666666" y="86" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text><text x="274.66666666666663" y="94" font-family="JetBrains Mono, monospace" font-size="14.5" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">forward</text><text x="265.66666666666663" y="116" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="500" fill="#6B7280" text-anchor="middle" dominant-baseline="central">records the graph</text><line x1="337.66666666666663" y1="100" x2="362.3333333333333" y2="100" stroke="#15181C" stroke-width="2.3"/><path d="M362.3333333333333,100 L355.02862181083486,103.26208362447656 L355.02862181083486,96.73791637552344 Z" fill="#15181C"/><rect x="365.3333333333333" y="67" width="138" height="66" rx="11" fill="#fff" stroke="#2196F3" stroke-width="2"/><circle cx="384.3333333333333" cy="86" r="11.5" fill="#7D12BA"/><text x="384.3333333333333" y="86" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text><text x="443.3333333333333" y="94" font-family="JetBrains Mono, monospace" font-size="14.5" font-weight="700" fill="#2196F3" text-anchor="middle" dominant-baseline="central">backward</text><text x="434.3333333333333" y="116" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="500" fill="#6B7280" text-anchor="middle" dominant-baseline="central">chain rule, reversed</text><line x1="506.3333333333333" y1="100" x2="531" y2="100" stroke="#15181C" stroke-width="2.3"/><path d="M531,100 L523.6952884775015,103.26208362447656 L523.6952884775015,96.73791637552344 Z" fill="#15181C"/><rect x="534" y="67" width="138" height="66" rx="11" fill="#fff" stroke="#90A4AE" stroke-width="2"/><circle cx="553" cy="86" r="11.5" fill="#7D12BA"/><text x="553" y="86" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text><text x="612" y="94" font-family="JetBrains Mono, monospace" font-size="14.5" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">read .grad</text><text x="603" y="116" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="500" fill="#6B7280" text-anchor="middle" dominant-baseline="central">use it, then reset</text><line x1="603" y1="133" x2="603" y2="212" stroke="#90A4AE" stroke-width="1.