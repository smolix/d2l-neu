<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 238" width="440" height="238"><style><![CDATA[@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');]]></style><text x="220" y="26" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">Chain rule: multiply along the path</text><text x="220" y="48" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#2196F3" text-anchor="middle" dominant-baseline="central">▸ forward: evaluate</text><line x1="112" y1="104" x2="190" y2="104" stroke="#2196F3" stroke-width="2.3"/><path d="M190,104 L182.69528847750152,107.26208362447656 L182.69528847750152,100.73791637552344 Z" fill="#2196F3"/><line x1="250" y1="104" x2="328" y2="104" stroke="#2196F3" stroke-width="2.3"/><path d="M328,104 L320.69528847750155,107.26208362447656 L320.69528847750155,100.73791637552344 Z" fill="#2196F3"/><text x="151" y="82" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#2196F3" text-anchor="middle" dominant-baseline="central">u = g(x)</text><text x="289" y="82" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#2196F3" text-anchor="middle" dominant-baseline="central">y = f(u)</text><line x1="328" y1="148" x2="250" y2="148" stroke="#FB8C00" stroke-width="2.3"/><path d="M250,148 L257.30471152249845,144.73791637552344 L257.30471152249845,151.26208362447656 Z" fill="#FB8C00"/><line x1="190" y1="148" x2="112" y2="148" stroke="#FB8C00" stroke-width="2.3"/><path d="M112,148 L119.30471152249847,144.73791637552344 L119.30471152249847,151.26208362447656 Z" fill="#FB8C00"/><text x="289" y="168" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#FB8C00" text-anchor="middle" dominant-baseline="central">dy/du</text><text x="151" y="168" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#FB8C00" text-anchor="middle" dominant-baseline="central">du/dx</text><text x="220" y="192" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#FB8C00" text-anchor="middle" dominant-baseline="central">◂ backward: differentiate</text><rect x="59" y="89" width="46" height="46" rx="6" fill="#F3E5F5" stroke="#7D12BA" stroke-width="2"/><text x="82" y="112" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700" fill="#7D12BA" text-anchor="middle" dominant-baseline="central">x</text><rect x="197" y="89" width="46" height="46" rx="6" fill="#F3E5F5" stroke="#7D12BA" stroke-width="2"/><text x="220" y="112" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700" fill="#7D12BA" text-anchor="middle" dominant-baseline="central">u</text><rect x="335" y="89" width="46" height="46" rx="6" fill="#F3E5F5" stroke="#7D12BA" stroke-width="2"/><text x="358" y="112" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700" fill="#7D12BA" text-anchor="middle" dominant-baseline="central">y</text><text x="220" y="226" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14.5" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">dy/dx = (dy/du)(du/dx)</text></svg>
