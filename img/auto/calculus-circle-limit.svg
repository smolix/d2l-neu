<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="560" height="300"><style>@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');</style><text x="280" y="32" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">Inscribe polygons with more and more vertices</text><circle cx="110" cy="138" r="78" fill="none" stroke="#90A4AE" stroke-width="1.6"/><polygon points="110.0,60.0 188.0,138.0 110.0,216.0 32.0,138.0" fill="#E3F2FD" fill-opacity="0.7" stroke="#2196F3" stroke-width="2"/><polygon points="110.0,138.0 110.0,60.0 188.0,138.0" fill="#FFE7C7" fill-opacity="0.9" stroke="#FB8C00" stroke-width="1.6"/><text x="136" y="112" font-family="Source Sans 3, sans-serif" font-size="12" font-weight="700" fill="#FB8C00" text-anchor="middle" dominant-baseline="central">r</text><text x="110" y="244" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">n = 4</text><text x="200" y="142" font-family="Source Sans 3, sans-serif" font-size="24" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">→</text><circle cx="290" cy="138" r="78" fill="none" stroke="#90A4AE" stroke-width="1.6"/><polygon points="290.0,60.0 345.2,82.8 368.0,138.0 345.2,193.2 290.0,216.0 234.8,193.2 212.0,138.0 234.8,82.8" fill="#E3F2FD" fill-opacity="0.7" stroke="#2196F3" stroke-width="2"/><text x="290" y="244" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">n = 8</text><text x="380" y="142" font-family="Source Sans 3, sans-serif" font-size="24" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">→</text><circle cx="470" cy="138" r="78" fill="none" stroke="#90A4AE" stroke-width="1.6"/><polygon points="470.0,60.0 499.8,65.9 525.2,82.8 542.1,108.2 548.0,138.0 542.1,167.8 525.2,193.2 499.8,210.1 470.0,216.0 440.2,210.1 414.8,193.2 397.9,167.8 392.0,138.0 397.9,108.2 414.8,82.8 440.2,65.9" fill="#E3F2FD" fill-opacity="0.7" stroke="#2196F3" stroke-width="2"/><text x="470" y="244" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">n = 16</text><text x="280" y="282" font-family="Source Sans 3, sans-serif" font-size="13.5" font-weight="600" fill="#6B7280" text-anchor="middle" dominant-baseline="central">n triangles, each ≈ ½ · (2πr/n) · r   →   area → πr²</text></svg>
