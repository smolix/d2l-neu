"central">0</text><line x1="165" y1="160" x2="375" y2="160" stroke="#2196F3" stroke-width="5"/><line x1="157.5" y1="176" x2="382.5" y2="176" stroke="#FB8C00" stroke-width="5"/><text x="270" y="214" font-family="Source Sans 3, sans-serif" font-size="11.5" font-weight="600" fill="#6B7280" text-anchor="middle" dominant-baseline="central">both features now share one scale (≈ zero mean, unit variance)</text></svg>
