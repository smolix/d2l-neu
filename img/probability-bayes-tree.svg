<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 300" width="580" height="300"><style><![CDATA[@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');]]></style><text x="290" y="26" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">Bayes' theorem inverts the tree</text><circle cx="70" cy="150" r="20" fill="#ECEFF1" stroke="#90A4AE" stroke-width="2"/><text x="70" y="150" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central"></text><circle cx="250" cy="86" r="22" fill="#D7EFD8" stroke="#43A047" stroke-width="2"/><text x="250" y="86" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">H=1</text><circle cx="250" cy="214" r="22" fill="#ECEFF1" stroke="#90A4AE" stroke-width="2"/><text x="250" y="214" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">H=0</text><line x1="88" y1="144" x2="226" y2="94" stroke="#15181C" stroke-width="2.3"/><path d="M226,94 L220.2434035080298,99.55532148742412 L218.02095391340475,93.42136060625903 Z" fill="#15181C"/><line x1="88" y1="156" x2="226" y2="206" stroke="#15181C" stroke-width="2.3"/><path d="M226,206 L218.02095391340475,206.57863939374099 L220.2434035080298,200.44467851257588 Z" fill="#15181C"/><text x="150" y="104" font-family="Source Sans 3, sans-serif" font-size="10" font-weight="700" fill="#43A047" text-anchor="middle" dominant-baseline="central">P(H=1)=0.0015</text><text x="150" y="196" font-family="Source Sans 3, sans-serif" font-size="10" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">P(H=0)=0.9985</text><circle cx="450" cy="56" r="18" fill="#fff" stroke="#FB8C00" stroke-width="2"/><text x="450" y="56" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">D=1</text><circle cx="450" cy="116" r="18" fill="#fff" stroke="#90A4AE" stroke-width="2"/><text x="450" y="116" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">D=0</text><circle cx="450" cy="184" r="18" fill="#fff" stroke="#FB8C00" stroke-width="2"/><text x="450" y="184" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">D=1</text><circle cx="450" cy="244" r="18" fill="#fff" stroke="#90A4AE" stroke-width="2"/><text x="450" y="244" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">D=0</text><line x1="272" y1="80" x2="432" y2="60" stroke="#15181C" stroke-width="2.3"/><path d="M432,60 L425.15630803701913,64.14293136750186 L424.3470846838796,57.6691445423858 Z" fill="#15181C"/><text x="360" y="60" font-family="Source Sans 3, sans-serif" font-size="10" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">1.00</text><line x1="272" y1="92" x2="432" y2="112" stroke="#15181C" stroke-width="2.3"/><path d="M432,112 L424.3470846838796,114.3308554576142 L425.15630803701913,107.85706863249814 Z" fill="#15181C"/><text x="360" y="104" font-family="Source Sans 3, sans-serif" font-size="10" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">0</text><line x1="272" y1="208" x2="432" y2="188" stroke="#15181C" stroke-width="2.3"/><path d="M432,188 L425.15630803701913,192.14293136750186 L424.3470846838796,185.6691445423858 Z" fill="#15181C"/><text x="360" y="184" font-family="Source Sans 3, sans-serif" font-size="10" font-weight="700" fill="#FB8C00" text-anchor="middle" dominant-baseline="central">0.01</text><line x1="272" y1="220" x2="432" y2="240" stroke="#15181C" stroke-width="2.3"/><path d="M432,240 L424.3470846838796,242.3308554576142 L425.15630803701913,235.85706863249814 Z" fill="#15181C"/><text x="360" y="236" font-family="Source Sans 3, sans-serif" font-size="10" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">0.99</text><text x="250" y="56" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">forward:  P(D | H)</text><text x="290" y="286" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="700" fill="#2196F3" text-anchor="middle" dominant-baseline="central">Bayes:  P(H | D) = P(D | H) P(H) / P(D)</text></svg>
