.7951290951167 Z" fill="#15181C"/><text x="340" y="132" font-family="Source Sans 3, sans-serif" font-size="10.5" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">0.00</text><line x1="262" y1="240" x2="411" y2="220" stroke="#15181C" stroke-width="2.3"/><path d="M411,220 L404.19418919795254,224.2048709048833 L403.3262461002371,217.73869482690333 Z" fill="#15181C"/><text x="340" y="222" font-family="Source Sans 3, sans-serif" font-size="10.5" font-weight="700" fill="#FB8C00" text-anchor="middle" dominant-baseline="central">0.01</text><line x1="262" y1="256" x2="411" y2="276" stroke="#15181C" stroke-width="2.3"/><path d="M411,276 L403.3262461002371,278.2613051730967 L404.19418919795254,271.7951290951167 Z" fill="#15181C"/><text x="340" y="272" font-family="Source Sans 3, sans-serif" font-size="10.5" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">0.99</text><text x="605" y="73" font-family="Source Sans 3, sans-serif" font-size="12" font-weight="700" fill="#43A047" text-anchor="middle" dominant-baseline="central">0.0015</text><text x="605" y="90" font-family="Source Sans 3, sans-serif" font-size="9.5" font-weight="700" fill="#43A047" text-anchor="middle" dominant-baseline="central">true +</text><text x="605" y="140" font-family="Source Sans 3, sans-serif" font-size="12" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">0</text><text x="605" y="213" font-family="Source Sans 3, sans-serif" font-size="12" font-weight="700" fill="#FB8C00" text-anchor="middle" dominant-baseline="central">0.009985</text><text x="605" y="230" font-family="Source Sans 3, sans-serif" font-size="9.5" font-weight="700" fill="#FB8C00" text-anchor="middle" dominant-baseline="central">false +</text><text x="605" y="280" font-family="Source Sans 3, sans-serif" font-size="12" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">0.9885</text><rect x="60" y="319" width="560" heig