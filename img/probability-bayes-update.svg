<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 258" width="560" height="258"><style><![CDATA[@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');]]></style><text x="280" y="28" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">Each positive test updates the belief</text><line x1="72" y1="200" x2="520" y2="200" stroke="#90A4AE" stroke-width="1.6"/><text x="80" y="60" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13.5" font-weight="700" fill="#6B7280" text-anchor="start" dominant-baseline="central">P(HIV)</text><rect x="93" y="198" width="78" height="2" rx="3" fill="#ECEFF1" stroke="#90A4AE" stroke-width="2"/><text x="132" y="184" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15.5" font-weight="700" fill="#90A4AE" text-anchor="middle" dominant-baseline="central">0.15%</text><text x="132" y="222" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#15181C" text-anchor="middle" dominant-baseline="central">prior</text><line x1="179" y1="184" x2="253" y2="184" stroke="#90A4AE" stroke-width="2.3"/><path d="M253,184 L245.69528847750152,187.26208362447656 L245.69528847750152,180.73791637552344 Z" fill="#90A4AE"/><rect x="261" y="182.57999999999998" width="78" height="17.42" rx="3" fill="#FFE7C7" stroke="#FB8C00" stroke-width="2"/><text x="300" y="168.57999999999998" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15.5" font-weight="700" fill="#FB8C00" text-anchor="middle" dominant-baseline="central">13%</text><text x="300" y="222" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#15181C" text-anchor="middle" dominant-baseline="central">after test 1</text><line x1="347" y1="184" x2="419" y2="184" stroke="#90A4AE" stroke-width="2.3"/><path d="M419,184 L411.69528847750155,187.26208362447656 L411.69528847750155,180.73791637552344 Z" fill="#90A4AE"/><rect x="427" y="88.77999999999999" width="78" height="111.22000000000001" rx="3" fill="#D7EFD8" stroke="#43A047" stroke-width="2"/><text x="466" y="74.77999999999999" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15.5" font-weight="700" fill="#43A047" text-anchor="middle" dominant-baseline="central">83%</text><text x="466" y="222" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#15181C" text-anchor="middle" dominant-baseline="central">after test 2</text><text x="280" y="244" font-family="'Source Sans 3', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#6B7280" text-anchor="middle" dominant-baseline="central">two independent tests turn a 0.15% prior into 83% confidence</text></svg>
