nchor="middle" dominant-baseline="central">0.15%</text><line x1="360" y1="84" x2="460" y2="126" stroke="#90A4AE" stroke-width="2.3"/><path d="M460,126 L452.0020019435524,126.17896113840784 L454.52837143571264,120.16379568088347 Z" fill="#90A4AE"/><text x="430" y="100" font-family="Source Sans 3, sans-serif" font-size="10.5" font-weight="700" fill="#6B7280" text-anchor="middle" dominant-baseline="central">99.85%</text><rect x="90" y="221" width="156" height="46" rx="9" fill="#D7EFD8" stroke="#43A047" stroke-width="2"/><text x="168" y="236" font-family="Source Sans 3, sans-serif" font-size="13.5" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">15 test +</text><text x="168" y="256" font-family="Source Sans 3, sans-serif" font-size="10" font-weight="500" fill="#6B7280" text-anchor="middle" dominant-baseline="central">100% detected</text><rect x="402" y="221" width="168" height="46" rx="9" fill="#FFE7C7" stroke="#FB8C00" stroke-width="2"/><text x="486" y="236" font-family="Source Sans 3, sans-serif" font-size="13.5" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">≈ 100 test +</text><text x="486" y="256" font-family="Source Sans 3, sans-serif" font-size="10" font-weight="500" fill="#6B7280" text-anchor="middle" dominant-baseline="central">1% false positive</text><line x1="168" y1="174" x2="168" y2="221" stroke="#43A047" stroke-width="2.3"/><path d="M168,221 L164.73791637552344,213.69528847750152 L171.26208362447656,213.69528847750152 Z" fill="#43A047"/><line x1="486" y1="174" x2="486" y2="221" stroke="#FB8C00" stroke-width="2.3"/><path d="M486,221 L482.7379163755234,213.69528847750152 L489.26208362447653,213.69528847750152 Z" fill="#FB8C00"/><rect x="95" y="297" width="470" height="42" rx="9" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="330" y="310" font-family="Source Sans 3, sans-serif" font-size="13.5" font-weight="700" fill="#15181C" text-anchor="middle" dominant-baseline="central">115 test positive · only 15 truly have HIV</text><text x="330" y="330" font-family="Source Sans 3, sans-serif" font-size="10" font-weight="500" fill="#6B7280" text-anchor="middle" dominant-baseline="central">P(H=1 | D=1) ≈ 15 / 115 ≈ 13%</text><line x1="200" y1="267" x2="300" y2="300" stroke="#90A4AE" stroke-width="2.3"/><path d="M300,300 L292.0409732031659,300.80863616495736 L294.0855001264433,294.6131000338137 Z" fill="#90A4AE"/><line x1="454" y1="267" x2="360" y2="300" stroke="#90A4AE" stroke-width="2.3"/><path d="M360,300 L365.81177641464143,294.50243190981524 L367.9728709638018,300.6582769892419 Z" fill="#90A4AE"/></svg>
