[project]
name = "d2l"
version = "1.0.3"
description = "Dive into Deep Learning"
license = "MIT-0"
requires-python = ">=3.11"
authors = [{ name = "D2L Developers", email = "d2l.devs@gmail.com" }]

dependencies = [
    "numpy",
    "matplotlib",
    "matplotlib-inline",
    "requests",
    "pandas",
    "scipy",
    "pillow",
    "ipython",
    "cairosvg",
]

[project.optional-dependencies]
pytorch = [
    "torch",
    "torchvision",
    "gymnasium[toy-text]",
    "gpytorch",
    "syne-tune[gpsearchers]",
]
mxnet = [
    "mxnet-cu117>=1.9.1,<2",
    "numpy<1.24",
    "nvidia-cudnn-cu11<9",
    "nvidia-nccl-cu11",
    "nvidia-cublas-cu11",
    "nvidia-cuda-runtime-cu11",
    "nvidia-cuda-nvrtc-cu11",
    "nvidia-cusolver-cu11",
    "nvidia-cusparse-cu11",
    "nvidia-cufft-cu11",
    "nvidia-curand-cu11",
    "nvidia-nvtx-cu11",
]
tensorflow = [
    "tensorflow",
    "tensorflow-datasets",
    "tensorflow-probability[tf]",
    "nvidia-cudnn-cu12",
    "nvidia-cublas-cu12",
    "nvidia-cuda-runtime-cu12",
    "nvidia-cuda-nvrtc-cu12",
    "nvidia-cufft-cu12",
    "nvidia-cusolver-cu12",
    "nvidia-cusparse-cu12",
    "nvidia-nccl-cu12",
    "nvidia-nvjitlink-cu12",
    "nvidia-cuda-cupti-cu12",
]
jax = [
    "jax[cuda12]>=0.10.0",
    "flax",
    "optax",
    "tensorflow",
    "tensorflow-datasets",
]
run = [
    "jupyter",
    "nbconvert",
    "ipykernel",
]

[project.scripts]
rsvg-convert = "d2l._rsvg_convert:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["d2l"]

[tool.uv]
environments = ["sys_platform == 'linux' and platform_machine == 'x86_64'"]
conflicts = [[{ extra = "pytorch" }, { extra = "jax" }, { extra = "mxnet" }, { extra = "tensorflow" }]]

[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu124" }
torchvision = { index = "pytorch-cu124" }

[dependency-groups]
dev = [
    "pyarrow>=23.0.1",
]
