[project]
name = "d2l"
version = "1.0.3"
description = "Dive into Deep Learning"
license = "MIT-0"
requires-python = ">=3.10"
authors = [{ name = "D2L Developers", email = "d2l.devs@gmail.com" }]

dependencies = [
    "numpy",
    "matplotlib",
    "matplotlib-inline",
    "requests",
    "pandas",
    "scipy",
    "pillow",
    "ipython",
]

[project.optional-dependencies]
pytorch = [
    "torch",
    "torchvision",
    "gymnasium[toy-text]",
    "gpytorch",
    "syne-tune[gpsearchers]",
]
jax = [
    "jax[cuda12]",
    "flax",
    "optax",
    "tensorflow",
    "tensorflow-datasets",
]
run = [
    "jupyter",
    "nbconvert",
    "ipykernel",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["d2l"]

[tool.uv]
environments = ["sys_platform == 'linux' and platform_machine == 'x86_64'"]

[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu124" }
torchvision = { index = "pytorch-cu124" }

[dependency-groups]
dev = [
    "pyarrow>=23.0.1",
]
